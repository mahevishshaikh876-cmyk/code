<!DOCTYPE html>
<html>

<head>

    <style>
        body {
            display: flex;
            justify-content: start;
            align-items: start;
            gap: 50px;
            flex-direction: row-reverse;
        }

        .sbox {
            width: 100px;
            height: 100px;
        }

        #red {
            background-color: red;
        }

        #blue {
            background-color: blue;
        }

        #green {
            background-color: green;
        }
    </style>

</head>

<body>

    <div class="sbox" id="red"></div>
    <div class="sbox" id="blue"></div>
    <div class="sbox" id="green"></div>

</body>

</html>
